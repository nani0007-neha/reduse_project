<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      // Single Page App hack for GitHub Pages
      // Stores the current URL and redirects to index.html
      sessionStorage.redirect = location.href
      var l = window.location
      var pathSegmentsToKeep = 1 // Keep repo name segment
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/',
      )
    </script>
  </head>
  <body></body>
</html>
